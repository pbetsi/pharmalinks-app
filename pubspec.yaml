name: pharmalink_app_new
description: Application de gestion pharmaceutique
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ============================================
  # 🔥 CORE & UI
  # ============================================
  cupertino_icons: ^1.0.9
  provider: ^6.1.2
  badges: ^3.1.2
  font_awesome_flutter: ^11.0.0
  
  # ✅ INTERNATIONALISATION - Plage compatible avec Flutter Vercel (0.19.0 OU 0.20.2)
  intl: '>=0.19.0 <0.21.0'  # ← Accepte les deux versions imposées par Vercel
  flutter_localizations:
    sdk: flutter
  jiffy: '>=6.2.1 <7.0.0'  # ✅ Compatible avec intl 0.19.0 et 0.20.2

  # ============================================
  # 🔐 AUTH & BACKEND
  # ============================================
  supabase_flutter: ^2.12.4
  firebase_core: ^3.15.2
  firebase_core_web: ^2.24.1
  firebase_messaging: ^15.2.10
  firebase_messaging_web: ^3.10.10

  # ============================================
  # 🔔 NOTIFICATIONS & PERMISSIONS
  # ============================================
  awesome_notifications: '>=0.10.0 <0.12.0'  # ✅ Compatible avec les deux versions d'intl
  permission_handler: ^12.0.1

  # ============================================
  # 🗺️ CARTE & GÉOLOCALISATION
  # ============================================
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  geolocator: ^13.0.4
  geocoding: ^4.0.0
  url_launcher: ^6.2.1  # ✅ Compatible avec Dart 3.5.0

  # ============================================
  # 📷 IMAGES, SCAN & OCR
  # ============================================
  image_picker: ^1.2.0
  mobile_scanner: ^3.5.7
  google_mlkit_text_recognition: ^0.11.0
  google_ml_kit: ^0.16.3
  flutter_tesseract_ocr: ^0.4.0

  # ============================================
  # 📁 FICHIERS, CSV & EXPORT
  # ============================================
  file_picker: ^6.2.1
  csv: ^6.0.0
  path: ^1.9.1
  path_provider: ^2.1.5

  # ============================================
  # 📄 PDF, IMPRESSION & PARTAGE
  # ============================================
  pdf: ^3.10.8  # ✅ Compatible avec vector_math 2.2.0
  printing: ^5.11.0
  pdf_widget_wrapper: ^1.0.4
  open_file: ^3.5.0
  share_plus: ^11.1.0

  # ============================================
  # 🌐 RÉSEAU & STOCKAGE LOCAL
  # ============================================
  http: ^1.3.0
  shared_preferences: ^2.4.0
  flutter_dotenv: ^6.0.1

  # ============================================
  # 📊 CHARTS & VISUALISATION
  # ============================================
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - .env